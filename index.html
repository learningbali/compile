<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary AI - Prompt Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for timeline */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased p-6">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Visionary AI Prompt Builder</h1>
            <p class="text-gray-400">Ubah Referensi Video Menjadi Prompt AI yang Unik & Sinematik</p>
        </header>

        <!-- Section 1: Input Media -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Upload Area -->
            <div class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center hover:border-blue-500 transition cursor-pointer flex flex-col items-center justify-center bg-gray-800">
                <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <p class="text-lg font-semibold">Tarik & Lepas Video di Sini</p>
                <p class="text-sm text-gray-500 mt-1">Mendukung MP4, MOV (Max 50MB)</p>
                <button class="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition">Atau Pilih File</button>
            </div>

            <!-- YouTube URL Area -->
            <div class="bg-gray-800 rounded-xl p-8 flex flex-col justify-center border border-gray-700">
                <h3 class="text-lg font-semibold mb-4">Import dari YouTube</h3>
                <div class="flex space-x-2">
                    <input type="text" placeholder="https://www.youtube.com/watch?v=..." class="flex-1 bg-gray-900 text-white border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500">
                    <button onclick="generateStoryboard()" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-medium transition whitespace-nowrap">Tarik Video</button>
                </div>
            </div>
        </section>

        <!-- Section 2: Style Selector -->
        <section class="bg-gray-800 rounded-xl p-6 border border-gray-700">
            <h3 class="text-lg font-semibold mb-4">Pilih Gaya Visual (Style Configuration)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="style-selector">
                <button class="style-btn active border-2 border-purple-500 bg-gray-900 rounded-lg p-4 text-center transition" onclick="selectStyle(this)">
                    <span class="text-2xl block mb-2">🚀</span>
                    <span class="font-medium">Futuristik</span>
                </button>
                <button class="style-btn border-2 border-gray-600 hover:border-gray-400 bg-gray-900 rounded-lg p-4 text-center transition" onclick="selectStyle(this)">
                    <span class="text-2xl block mb-2">🍃</span>
                    <span class="font-medium">Anime Ghibli</span>
                </button>
                <button class="style-btn border-2 border-gray-600 hover:border-gray-400 bg-gray-900 rounded-lg p-4 text-center transition" onclick="selectStyle(this)">
                    <span class="text-2xl block mb-2">🎨</span>
                    <span class="font-medium">Lukisan Klasik</span>
                </button>
                <button class="style-btn border-2 border-gray-600 hover:border-gray-400 bg-gray-900 rounded-lg p-4 text-center transition" onclick="selectStyle(this)">
                    <span class="text-2xl block mb-2">🎥</span>
                    <span class="font-medium">Documenter</span>
                </button>
            </div>
        </section>

        <!-- Section 3: Timeline & Storyboard (Hidden by default until video is processed) -->
        <section id="storyboard-section" class="hidden space-y-6">
            <div class="flex items-center justify-between border-b border-gray-700 pb-2">
                <h2 class="text-2xl font-bold text-blue-400">Smart Clipper & Storyboard</h2>
                <button class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-medium transition">Copy Semua Prompt</button>
            </div>

            <!-- Segment 1 -->
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/4">
                    <div class="w-full h-32 bg-gray-700 rounded-lg flex items-center justify-center mb-2">
                        <span class="text-gray-500 text-sm">[Thumbnail 0-2s]</span>
                    </div>
                    <span class="bg-gray-900 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">0:00 - 0:02</span>
                </div>
                <div class="md:w-3/4 flex flex-col">
                    <label class="text-sm text-gray-400 mb-2 font-semibold">Generated Prompt (Mobil Sports):</label>
                    <textarea class="w-full h-full min-h-[120px] bg-gray-900 text-gray-200 border border-gray-600 rounded-lg p-4 text-sm focus:outline-none focus:border-blue-500 resize-none" readonly>Ultra-Realistic Cinematic ASMR Commercial. Photorealistic, Hyper-realistic textures, 8K quality, Luxury commercial, Professional styling, Editorial product photography, Cinematic masterpiece, Commercial advertisement quality. Macro close-up of a precision screwdriver tightening a polished metal screw into the detailed chassis of a sleek diecast sports car. Sharp focus on the metallic threads and mechanical parts. Dramatic studio lighting. No music. No dialogue. No narration. No voice-over. No text overlay. No subtitles. No captions. No logo. No watermark. No branding. No face visible.</textarea>
                    <button class="self-end mt-3 text-sm text-blue-400 hover:text-blue-300">📋 Copy Prompt Ini</button>
                </div>
            </div>

            <!-- Segment 2 -->
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/4">
                    <div class="w-full h-32 bg-gray-700 rounded-lg flex items-center justify-center mb-2">
                        <span class="text-gray-500 text-sm">[Thumbnail 3-4s]</span>
                    </div>
                    <span class="bg-gray-900 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">0:03 - 0:04</span>
                </div>
                <div class="md:w-3/4 flex flex-col">
                    <label class="text-sm text-gray-400 mb-2 font-semibold">Generated Prompt (Kereta Api):</label>
                    <textarea class="w-full h-full min-h-[120px] bg-gray-900 text-gray-200 border border-gray-600 rounded-lg p-4 text-sm focus:outline-none focus:border-blue-500 resize-none" readonly>Ultra-Realistic Cinematic ASMR Commercial. Photorealistic, Hyper-realistic textures, 8K quality, Luxury commercial, Professional styling, Editorial product photography, Cinematic masterpiece, Commercial advertisement quality. Extreme close-up of heavy, vintage metal model train wheels being gently lowered and perfectly locking onto miniature steel railway tracks. Deep shadows and warm rim lighting emphasizing the heavy iron textures. No music. No dialogue. No narration. No voice-over. No text overlay. No subtitles. No captions. No logo. No watermark. No branding. No face visible.</textarea>
                    <button class="self-end mt-3 text-sm text-blue-400 hover:text-blue-300">📋 Copy Prompt Ini</button>
                </div>
            </div>
            
            <!-- You can add more segments here following the same structure -->
            
        </section>
    </div>

    

    <!-- JavaScript for interactivity -->
    <script>
//fetch

        async function generateStoryboard() {
    const btn = event.target;
    btn.innerText = "Memproses...";
    
    try {
        // Mengirim permintaan ke Backend Python
        const formData = new FormData();
        formData.append("youtube_url", "https://youtube.com/contoh");
        formData.append("style_preference", "futuristik"); // Bisa diubah secara dinamis

        const response = await fetch("https://backend-visionary.vercel.app/api/process-video", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        
        // Tampilkan hasil dari backend ke layar (Console Log sebagai bukti jalan)
        console.log("Prompt berhasil dibuat oleh Backend:", data);
        
        // Membuka blok UI
        document.getElementById('storyboard-section').classList.remove('hidden');
        btn.innerText = "Tarik Video";
        
    } catch (error) {
        console.error("Gagal terhubung ke backend:", error);
        btn.innerText = "Gagal. Coba Lagi.";
    }
}





        //gdgdgdgd
        // Function to handle style button selection
        function selectStyle(clickedBtn) {
            const buttons = document.querySelectorAll('.style-btn');
            buttons.forEach(btn => {
                btn.classList.remove('border-purple-500');
                btn.classList.add('border-gray-600', 'hover:border-gray-400');
            });
            clickedBtn.classList.remove('border-gray-600', 'hover:border-gray-400');
            clickedBtn.classList.add('border-purple-500');
        }

        // Function to simulate video fetching and generating storyboard
        function generateStoryboard() {
            const btn = event.target;
            const originalText = btn.innerText;
            
            // Loading state
            btn.innerText = "Memproses...";
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            // Simulate API call delay (2 seconds)
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                
                // Show the storyboard section
                const storyboard = document.getElementById('storyboard-section');
                storyboard.classList.remove('hidden');
                
                // Scroll down to storyboard
                storyboard.scrollIntoView({ behavior: 'smooth' });
            }, 2000);
        }
    </script>
</body>
</html>
