<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Storyboard Generator V1 Gass</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-amber-400 mb-2">🎬 AI Storyboard Director</h1>
            <p class="text-gray-400 text-sm md:text-base">Ketik ide cerita apa saja. AI akan otomatis merancang detail adegannya secara universal.</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl mb-8 border border-gray-700 space-y-6">
            <!-- Input Text Cerita -->
            <div>
                <label for="promptInput" class="block text-sm font-semibold text-gray-300 mb-3">Apa ide cerita atau konsep video Anda?</label>
                <textarea id="promptInput" rows="4" 
                    class="w-full bg-gray-700 border border-gray-600 rounded-xl p-4 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-amber-400"
                    placeholder="Anda adalah seorang Sutradara dan Ahli Storyboard Universal. Anda akan menerima teks cerita, maksimal 10 gambar referensi (gaya visual/karakter), dan 1 video referensi (gerakan/kamera)"></textarea>
            </div>

            <!-- Input Referensi Gambar & Video -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Bagian Gambar -->
                <div class="bg-gray-950 p-4 rounded-xl border border-gray-700">
                    <label class="block text-xs font-bold uppercase tracking-wider text-amber-400 mb-2">Gambar Referensi Karakter/Style (Maks 10)</label>
                    <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImages(this)"
                        class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-400 file:text-gray-900 hover:file:bg-amber-500 cursor-pointer" />
                    <div id="imagePreview" class="flex flex-wrap gap-2 mt-3"></div>
                </div>

                <!-- Bagian Video -->
                <div class="bg-gray-950 p-4 rounded-xl border border-gray-700">
                    <label class="block text-xs font-bold uppercase tracking-wider text-amber-400 mb-2">Video Referensi Gerakan/Kamera (Maks 1)</label>
                    <input type="file" id="videoInput" accept="video/*" onchange="handleVideo(this)"
                        class="block w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-400 file:text-gray-900 hover:file:bg-amber-500 cursor-pointer" />
                    <div id="videoPreview" class="mt-3"></div>
                </div>
            </div>

            <!-- Tombol Generate -->
            <button onclick="generateStoryboard()" id="submitBtn"
                class="w-full bg-amber-400 hover:bg-amber-500 text-gray-900 font-bold py-3 px-6 rounded-xl transition duration-200 shadow-lg cursor-pointer text-center block">
                Generate Storyboard
            </button>
        </div>

        <!-- Hasil Output -->
        <div id="resultContainer" class="hidden bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 class="text-xl font-bold text-amber-400 mb-4 border-b border-gray-700 pb-2">📋 Hasil Analisis & Storyboard</h2>
            <div id="resultOutput" class="whitespace-pre-wrap text-gray-300 text-sm leading-relaxed"></div>
        </div>
    </div>

    <script>
        let uploadedImages = [];
        let uploadedVideo = null;

        // Proses kompresi gambar agar tidak merusak limit payload Vercel
        function handleImages(input) {
            const files = Array.from(input.files).slice(0, 10);
            uploadedImages = [];
            const previewContainer = document.getElementById('imagePreview');
            previewContainer.innerHTML = '';

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxDim = 800; 
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                        else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        uploadedImages.push({
                            base64: compressedBase64.split(',')[1],
                            mimeType: 'image/jpeg'
                        });

                        previewContainer.innerHTML += `<img src="${compressedBase64}" class="w-16 h-16 object-cover rounded-lg border border-gray-600">`;
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        // Proses video menjadi base64 (pastikan durasi sangat singkat/file kecil)
        function handleVideo(input) {
            const file = input.files[0];
            const previewContainer = document.getElementById('videoPreview');
            previewContainer.innerHTML = '';
            uploadedVideo = null;

            if (!file) return;

            // Batasi ukuran video di frontend demi stabilitas serverless Vercel (contoh maks 15MB)
            if (file.size > 15 * 1024 * 1024) {
                alert("Ukuran video terlalu besar. Silakan gunakan klip video referensi di bawah 15MB.");
                input.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedVideo = {
                    base64: e.target.result.split(',')[1],
                    mimeType: file.type
                };
                previewContainer.innerHTML = `<video src="${e.target.result}" controls class="w-full max-h-40 rounded-lg border border-gray-600"></video>`;
            };
            reader.readAsDataURL(file);
        }

        async function generateStoryboard() {
            const promptText = document.getElementById('promptInput').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultOutput = document.getElementById('resultOutput');

            if (!promptText) {
                alert("Silakan isi konsep cerita Anda terlebih dahulu!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Memproses dengan AI Director...";
            resultContainer.classList.add('hidden');

            try {
                // Endpoint disesuaikan dengan struktur folder /api/generate Anda
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: promptText,
                        images: uploadedImages,
                        video: uploadedVideo
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    resultContainer.classList.remove('hidden');
                    resultOutput.innerText = result.data;
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Gagal terhubung ke server: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Generate Storyboard";
            }
        }
    </script>
</body>
</html>
