<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Storyboard Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-icons/1.0.0/icon.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-amber-400 mb-2">🎬 AI Storyboard Director</h1>
            <p class="text-gray-400 text-sm">Ubah ide ceritamu menjadi detail scene video dalam hitungan detik.</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl mb-8 border border-gray-700">
            <label for="promptInput" class="block text-sm font-medium text-gray-300 mb-2">Masukkan Ide Cerita / Prompt:</label>
            <textarea id="promptInput" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-xl p-4 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent resize-none" placeholder="Contoh: tiny world petani di sawah kering, dibantu tangan manusia menyalurkan air..."></textarea>
            
            <button id="generateBtn" class="mt-4 w-full bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-3 px-6 rounded-xl transition duration-200 flex items-center justify-center gap-2">
                <span>Generate Storyboard</span>
            </button>
        </div>

        <div id="loading" class="hidden text-center py-8">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-400 mx-auto mb-4"></div>
            <p class="text-gray-400">AI sedang menyusun adegan...</p>
        </div>

        <div id="storyboardResult" class="hidden">
            <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">📋 Hasil Storyboard</h2>
            
            <div id="gridContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>

    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return alert('Silahkan isi prompt terlebih dahulu!');

            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('storyboardResult');
            const gridContainer = document.getElementById('gridContainer');

            // Tampilkan loading, sembunyikan hasil sebelumnya
            loading.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            gridContainer.innerHTML = '';

            try {
                // PANGGIL BACKEND API ANDA DI SINI
                // Contoh jika backend Anda berjalan di localhost:3000
                /*
                const response = await fetch('http://localhost:3000/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                */

                // KARENA INI CONTOH, KITA GUNAKAN DATA DUMMY YANG SAMA SEPERTI DI VIDEO
                const dummyData = [
                    { scene: 1, durasi: "00:00 - 00:01", visual: "Sawah kering dan retak, petani mini memegang cangkul.", camera: "Macro close-up, low angle", motion: "Petani melihat ke atas dengan cemas", sfx: "Suara angin kering menembus celah tanah" },
                    { scene: 2, durasi: "00:01 - 00:03", visual: "Tangan manusia raksasa memasang pipa kecil di pematang sawah mini.", camera: "Extreme macro, high angle", motion: "Tangan mengencangkan posisi pipa", sfx: "Suara gesekan pipa plastik" },
                    { scene: 3, durasi: "00:03 - 00:05", visual: "Air mulai mengalir keluar dari pipa kecil ke tanah retak.", camera: "Macro close-up, eye level", motion: "Air mengalir deras membasahi tanah", sfx: "Suara gemercik air mengalir segar" },
                    { scene: 4, durasi: "00:05 - 00:08", visual: "Padi mini mulai tumbuh menghijau dengan cepat di area yang basah.", camera: "Timelapse style macro, panning", motion: "Tunas padi tumbuh ke atas", sfx: "Suara pertumbuhan tanaman (efek pop/rustle)" },
                    { scene: 5, durasi: "00:08 - 00:10", visual: "Petani mini tersenyum lebar, mengangkat cangkulnya bahagia.", camera: "Medium shot, eye level", motion: "Petani melambaikan tangan gembira", sfx: "Suara tawa petani mini yang samar" }
                ];

                // Simulasi delay loading API selama 1.5 detik
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Render Data ke Grid
                dummyData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-lg p-5 flex flex-col gap-3";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                            <span class="bg-amber-500 text-gray-900 text-xs font-bold px-2 py-1 rounded">SCENE ${item.scene}</span>
                            <span class="text-xs text-gray-400">⏱️ ${item.durasi}</span>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-amber-400 uppercase tracking-wider">Visual</p>
                            <p class="text-sm text-gray-200 mt-1">${item.visual}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-2 pt-2 border-t border-gray-700/50 text-xs">
                            <div>
                                <span class="text-gray-400 block font-medium">📷 Camera:</span>
                                <span class="text-gray-300">${item.camera}</span>
                            </div>
                            <div>
                                <span class="text-gray-400 block font-medium">🏃 Motion:</span>
                                <span class="text-gray-300">${item.motion}</span>
                            </div>
                        </div>
                        <div class="text-xs bg-gray-900/50 p-2 rounded border border-gray-700/30">
                            <span class="text-amber-500/80 font-medium">🎵 SFX:</span> ${item.sfx}
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });

                // Sembunyikan loading, tampilkan hasil
                loading.classList.add('hidden');
                resultDiv.classList.remove('hidden');

            } catch (error) {
                alert('Gagal memproses data!');
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
